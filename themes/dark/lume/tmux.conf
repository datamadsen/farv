# Lume dark theme colors
set -g @SESSION_HIGHLIGHT "#c4b080"      # Hostname and session name color (lume honey)
set -g @WINDOW_ACTIVE_BG "#1e1a2c"      # Background for active window (lume surface 0)
set -g @WINDOW_ACTIVE_SEP "#d0a0b8"     # Separator color for active window (lume rose)
set -g @WINDOW_INACTIVE_SEP "#b8a0e0"   # Separator color for inactive windows (lume lavender)
set -g @TEXT_MAIN "#d8d0e4"             # Main text color (lume text)

