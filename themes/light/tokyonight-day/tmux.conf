# Tokyo Night Day light theme colors
set -g @SESSION_HIGHLIGHT "#8c6c3e"      # Hostname and session name color (tokyonight yellow)
set -g @WINDOW_ACTIVE_BG "#c4c8da"       # Background for active window (tokyonight bg_highlight)
set -g @WINDOW_ACTIVE_SEP "#f52a65"      # Separator color for active window (tokyonight red)
set -g @WINDOW_INACTIVE_SEP "#9854f1"    # Separator color for inactive windows (tokyonight magenta)
set -g @TEXT_MAIN "#3760bf"              # Main text color (tokyonight foreground)
