# Colors (Tokyo Night Day)
# Source: https://github.com/folke/tokyonight.nvim

# Default colors
[colors.primary]
background = '#e1e2e7'
foreground = '#3760bf'

[colors.cursor]
text = '#e1e2e7'
cursor = '#3760bf'

[colors.selection]
text = '#3760bf'
background = '#b7c1e3'

# Normal colors
[colors.normal]
black   = '#b4b5b9'
red     = '#f52a65'
green   = '#587539'
yellow  = '#8c6c3e'
blue    = '#2e7de9'
magenta = '#9854f1'
cyan    = '#007197'
white   = '#6172b0'

# Bright colors
[colors.bright]
black   = '#a1a6c5'
red     = '#ff4774'
green   = '#5c8524'
yellow  = '#a27629'
blue    = '#358aff'
magenta = '#a463ff'
cyan    = '#007ea8'
white   = '#3760bf'
