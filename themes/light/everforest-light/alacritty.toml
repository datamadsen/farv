# Colors (Everforest Light Medium)
# Source: https://github.com/sainnhe/everforest

# Default colors
[colors.primary]
background = '#fdf6e3'
foreground = '#5c6a72'

[colors.cursor]
text = '#fdf6e3'
cursor = '#5c6a72'

[colors.selection]
text = '#5c6a72'
background = '#e6e2cc'

# Normal colors
[colors.normal]
black   = '#5c6a72'
red     = '#f85552'
green   = '#8da101'
yellow  = '#dfa000'
blue    = '#3a94c5'
magenta = '#df69ba'
cyan    = '#35a77c'
white   = '#e0dcc7'

# Bright colors
[colors.bright]
black   = '#939f91'
red     = '#e66868'
green   = '#93b259'
yellow  = '#f57d26'
blue    = '#3a94c5'
magenta = '#df69ba'
cyan    = '#35a77c'
white   = '#fdf6e3'
