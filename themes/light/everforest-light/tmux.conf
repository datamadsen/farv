# Everforest light theme colors
set -g @SESSION_HIGHLIGHT "#dfa000"      # Hostname and session name color (everforest yellow)
set -g @WINDOW_ACTIVE_BG "#e6e2cc"       # Background for active window (everforest bg3)
set -g @WINDOW_ACTIVE_SEP "#f85552"      # Separator color for active window (everforest red)
set -g @WINDOW_INACTIVE_SEP "#df69ba"    # Separator color for inactive windows (everforest purple)
set -g @TEXT_MAIN "#5c6a72"              # Main text color (everforest foreground)
