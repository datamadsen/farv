# Colors (Flexoki Light)
# Source: https://github.com/kepano/flexoki

# Default colors
[colors.primary]
background = '#FFFCF0'
foreground = '#100F0F'

[colors.cursor]
text = '#FFFCF0'
cursor = '#100F0F'

[colors.selection]
text = '#100F0F'
background = '#E6E4D9'

# Normal colors
[colors.normal]
black   = '#100F0F'
red     = '#D14D41'
green   = '#879A39'
yellow  = '#D0A215'
blue    = '#4385BE'
magenta = '#CE5D97'
cyan    = '#3AA99F'
white   = '#FFFCF0'

# Bright colors
[colors.bright]
black   = '#6F6E69'
red     = '#AF3029'
green   = '#66800B'
yellow  = '#AD8301'
blue    = '#205EA6'
magenta = '#A02F6F'
cyan    = '#24837B'
white   = '#FFFCF0'
