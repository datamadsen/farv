# Flexoki light theme colors
set -g @SESSION_HIGHLIGHT "#D0A215"      # Hostname and session name color (flexoki yellow)
set -g @WINDOW_ACTIVE_BG "#E6E4D9"       # Background for active window (flexoki base-100)
set -g @WINDOW_ACTIVE_SEP "#D14D41"      # Separator color for active window (flexoki red)
set -g @WINDOW_INACTIVE_SEP "#CE5D97"    # Separator color for inactive windows (flexoki magenta)
set -g @TEXT_MAIN "#100F0F"              # Main text color (flexoki black)
