# Colors (Kanagawa Lotus)
# Source: https://github.com/rebelot/kanagawa.nvim

# Default colors
[colors.primary]
background = '#f2ecbc'
foreground = '#545464'

[colors.cursor]
text = '#f2ecbc'
cursor = '#545464'

[colors.selection]
text = '#545464'
background = '#c9cbd1'

# Normal colors (ANSI 0-7)
[colors.normal]
black   = '#1f1f28'
red     = '#c84053'
green   = '#6f894e'
yellow  = '#77713f'
blue    = '#4d699b'
magenta = '#b35b79'
cyan    = '#597b75'
white   = '#545464'

# Bright colors (ANSI 8-15)
[colors.bright]
black   = '#8a8980'
red     = '#d7474b'
green   = '#6e915f'
yellow  = '#836f4a'
blue    = '#6693bf'
magenta = '#624c83'
cyan    = '#5e857a'
white   = '#43436c'
