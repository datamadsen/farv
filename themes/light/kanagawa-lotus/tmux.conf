# Kanagawa Lotus light theme colors
set -g @SESSION_HIGHLIGHT "#cc6d00"      # Hostname and session name color (lotus orange)
set -g @WINDOW_ACTIVE_BG "#e7dba0"       # Background for active window (lotus bg_p1)
set -g @WINDOW_ACTIVE_SEP "#c84053"      # Separator color for active window (lotus red)
set -g @WINDOW_INACTIVE_SEP "#624c83"    # Separator color for inactive windows (lotus violet4)
set -g @TEXT_MAIN "#545464"              # Main text color (lotus ink1)
