# Zenbones light theme colors
set -g @SESSION_HIGHLIGHT "#944927"      # Hostname and session name color (zenbones yellow/wood)
set -g @WINDOW_ACTIVE_BG "#CBD9E3"       # Background for active window (zenbones selection)
set -g @WINDOW_ACTIVE_SEP "#A8334C"      # Separator color for active window (zenbones red)
set -g @WINDOW_INACTIVE_SEP "#88507D"    # Separator color for inactive windows (zenbones magenta)
set -g @TEXT_MAIN "#2C363C"              # Main text color (zenbones foreground)
