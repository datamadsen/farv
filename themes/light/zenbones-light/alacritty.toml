# Colors (Zenbones Light)
# Source: https://github.com/mcchrish/zenbones.nvim

# Default colors
[colors.primary]
background = '#F0EDEC'
foreground = '#2C363C'

[colors.cursor]
text = '#F0EDEC'
cursor = '#2C363C'

[colors.selection]
text = '#2C363C'
background = '#CBD9E3'

# Normal colors
[colors.normal]
black   = '#F0EDEC'
red     = '#A8334C'
green   = '#4F6C31'
yellow  = '#944927'
blue    = '#286486'
magenta = '#88507D'
cyan    = '#3B8992'
white   = '#2C363C'

# Bright colors
[colors.bright]
black   = '#CFC1BA'
red     = '#94253E'
green   = '#3F5A22'
yellow  = '#803D1C'
blue    = '#1D5573'
magenta = '#7B3B70'
cyan    = '#2B747C'
white   = '#4F5E68'
